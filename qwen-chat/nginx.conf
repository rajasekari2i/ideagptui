server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location / {
        root /var/www/qwen-chat;
        try_files $uri $uri/ /index.html;
    }
}
